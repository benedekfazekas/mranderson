name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        jdk: [8, 11, 17, 21]
        clojure: ['1.10', '1.11', '1.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.jdk }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.jdk }}

      - name: Install Leiningen
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          lein: latest

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: m2-${{ hashFiles('project.clj') }}
          restore-keys: m2-

      - name: Run tests (Clojure ${{ matrix.clojure }})
        run: lein with-profile +${{ matrix.clojure }} test

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Leiningen
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          lein: latest

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: m2-${{ hashFiles('project.clj') }}
          restore-keys: m2-

      - name: Eastwood
        run: lein with-profile +eastwood eastwood

      - name: Shellcheck
        run: shellcheck scripts/*.sh

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Leiningen
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          lein: latest

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: m2-${{ hashFiles('project.clj') }}
          restore-keys: m2-

      - name: Coverage
        run: lein kaocha-coverage --codecov

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: target/coverage/codecov.json
          token: ${{ secrets.CODECOV_TOKEN }}

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Leiningen
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          lein: latest

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: m2-${{ hashFiles('project.clj') }}
          restore-keys: m2-

      # MrAnderson inlining its own (pinned) dependencies is deterministic, so a
      # failure here is a real regression in the core pipeline and must fail CI.
      - name: Build inlined MrAnderson
        run: make install

      # cider-nrepl/refactor-nrepl track moving upstream targets, so their builds
      # are informative but allowed to fail without turning the whole run red.
      - name: Downstream integration (cider-nrepl, refactor-nrepl)
        continue-on-error: true
        run: scripts/downstream_test.sh
